name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.28.1'
  AWS_EC2_METADATA_DISABLED: 'true'
  CDK_DISABLE_VERSION_CHECK: 'true'

jobs:
  validate:
    name: Quality, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pinned pnpm with Corepack
        run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          test "$(pnpm --version)" = "$PNPM_VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  synth:
    name: Synth (${{ matrix.environment }})
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: staging
            account: ${{ vars.STAGING_AWS_ACCOUNT_ID || '000000000000' }}
            workload_region: ${{ vars.STAGING_AWS_WORKLOAD_REGION || 'us-west-2' }}
            domain: ${{ vars.STAGING_DOMAIN_NAME || 'staging.example.invalid' }}
            hosted_zone_id: ${{ vars.STAGING_HOSTED_ZONE_ID || 'Z000000000000000000000' }}
            hosted_zone_name: ${{ vars.STAGING_HOSTED_ZONE_NAME || 'example.invalid' }}
          - environment: production
            account: ${{ vars.PRODUCTION_AWS_ACCOUNT_ID || '000000000000' }}
            workload_region: ${{ vars.PRODUCTION_AWS_WORKLOAD_REGION || 'us-west-2' }}
            domain: ${{ vars.PRODUCTION_DOMAIN_NAME || 'production.example.invalid' }}
            hosted_zone_id: ${{ vars.PRODUCTION_HOSTED_ZONE_ID || 'Z000000000000000000000' }}
            hosted_zone_name: ${{ vars.PRODUCTION_HOSTED_ZONE_NAME || 'example.invalid' }}
    env:
      CDK_ACCOUNT: ${{ matrix.account }}
      CDK_WORKLOAD_REGION: ${{ matrix.workload_region }}
      CDK_DOMAIN: ${{ matrix.domain }}
      CDK_HOSTED_ZONE_ID: ${{ matrix.hosted_zone_id }}
      CDK_HOSTED_ZONE_NAME: ${{ matrix.hosted_zone_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pinned pnpm with Corepack
        run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate validated no-lookup context
        run: node scripts/write-cdk-context.mjs "${{ matrix.environment }}"

      - name: Synthesize without AWS credentials or lookups
        run: >-
          pnpm --dir packages/cdk exec cdk synth
          --context environment="${{ matrix.environment }}"
          --output cdk.out
          --quiet

  docker:
    name: Build Docker images
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOCKER_BUILDKIT: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build MCP server image
        run: >-
          docker build
          --file packages/cdk/docker/mcp.Dockerfile
          --tag smithy-mcp-server:ci
          .

      - name: Build ingestion image
        run: >-
          docker build
          --build-arg TARGETARCH=amd64
          --file packages/ingestion/Dockerfile
          --tag smithy-mcp-ingestion:ci
          .
